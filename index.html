<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HR Analytics AI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 30px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #1d3557;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 20px;
      margin-bottom: 8px;
    }

    input, textarea, button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 15px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      border: none;
    }

    button:hover {
      background: #1e40af;
    }

    #output {
      margin-top: 30px;
      background: #f8fafc;
      padding: 20px;
      border-radius: 10px;
      white-space: pre-wrap;
      line-height: 1.6;
      border: 1px solid #dbeafe;
    }

    .loading {
      color: #2563eb;
      font-weight: bold;
    }

    .small {
      color: #666;
      font-size: 13px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>HR Analytics AI Assistant</h1>

  <label>Groq API Key</label>
  <input type="password" id="apiKey" placeholder="Enter Groq API Key">

  <label>Google Sheet Published URL</label>
  <input
    type="text"
    id="sheetUrl"
    value="https://docs.google.com/spreadsheets/d/e/2PACX-1vTKoh8d2RaxpwcT9BXtq3bqXQoVQKycqT6MAJ9VEpvqDUQ94JfFYp3QSQJaNucJiAxAOuYm_YZFyzZq/pubhtml"
  >

  <div class="small">
    Use a Published Google Sheet URL
  </div>

  <label>HR Analytics Prompt</label>
  <textarea id="prompt">
Analyze employee attrition, salary trends, department-wise performance, overtime impact, job satisfaction, and provide actionable HR insights.
  </textarea>

  <button onclick="analyzeSheet()">
    Analyze HR Data
  </button>

  <div id="output"></div>

</div>

<script>

async function analyzeSheet() {

  const apiKey = document.getElementById("apiKey").value.trim();
  const sheetUrl = document.getElementById("sheetUrl").value.trim();
  const prompt = document.getElementById("prompt").value.trim();
  const output = document.getElementById("output");

  if (!apiKey || !sheetUrl || !prompt) {
    alert("Please fill all fields");
    return;
  }

  output.innerHTML = "<div class='loading'>Loading Google Sheet data...</div>";

  try {

    // Convert pubhtml → csv export
    let csvUrl = convertGoogleSheetToCSV(sheetUrl);

    // Fetch CSV data
    const csvResponse = await fetch(csvUrl);
    const csvText = await csvResponse.text();

    // Parse CSV
    const parsedData = parseCSV(csvText);

    output.innerHTML = "<div class='loading'>Analyzing HR data with Groq AI...</div>";

    // Build AI prompt
    const systemPrompt = `
You are an expert HR Analytics consultant.

Analyze the HR dataset and provide:

1. Attrition Analysis
2. Department-wise Insights
3. Salary & Compensation Patterns
4. Overtime Impact
5. Employee Satisfaction Trends
6. Workforce Risk Areas
7. Actionable HR Recommendations
8. Executive Summary

Dataset:
${JSON.stringify(parsedData).slice(0, 120000)}

User Request:
${prompt}
`;

    // Call Groq API
    const groqResponse = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [
          {
            role: "user",
            content: systemPrompt
          }
        ],
        temperature: 0.4,
        max_tokens: 3000
      })
    });

    const result = await groqResponse.json();

    if (result.error) {
      throw new Error(result.error.message);
    }

    const aiText = result.choices[0].message.content;

    output.innerHTML = `
      <h2>HR Analytics Report</h2>
      <div>${formatText(aiText)}</div>
    `;

  } catch (error) {

    output.innerHTML = `
      <div style="color:red;">
        Error: ${error.message}
      </div>
    `;
  }
}


// Convert Google Sheet Published URL to CSV Export URL
function convertGoogleSheetToCSV(url) {

  if (url.includes("pubhtml")) {
    return url.replace("pubhtml", "pub?output=csv");
  }

  if (url.includes("/edit")) {
    return url.replace("/edit", "/export?format=csv");
  }

  return url;
}


// Simple CSV Parser
function parseCSV(text) {

  const lines = text.split("\n").filter(line => line.trim() !== "");

  const headers = lines[0]
    .split(",")
    .map(h => h.replace(/"/g, "").trim());

  const data = [];

  for (let i = 1; i < lines.length; i++) {

    const row = lines[i]
      .split(",")
      .map(c => c.replace(/"/g, "").trim());

    const obj = {};

    headers.forEach((header, index) => {
      obj[header] = row[index];
    });

    data.push(obj);
  }

  return data;
}


// Basic formatting
function formatText(text) {

  return text
    .replace(/\n/g, "<br>")
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
}

</script>

</body>
</html>
