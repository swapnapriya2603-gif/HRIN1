```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HR Analytics Assistant</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 30px;
    }

    .container {
      max-width: 1100px;

      margin-top: 0;

    }

    label {
      font-weight: bold;

      width: 100%;

      min-height: 140px;

    button {
      margin-top: 20px;

    }

      background: #1d4ed8;
    }

    .output {
      margin-top: 30px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 20px;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .loading {
      color: #2563eb;
      font-weight: bold;
      margin-top: 15px;
    }

    .note {
      background: #fef3c7;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .small {
      font-size: 13px;
      color: #475569;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>HR Analytics AI Assistant</h1>

  <div class="note">
    Ensure your Google Sheet is shared as:
    <b>Anyone with the link → Viewer</b>
  </div>

  <label>OpenAI API Key</label>
  <input type="password" id="apiKey" placeholder="Enter OpenAI API Key" />

  <label>Google Sheet URL</label>
  <input
    type="text"
    id="sheetUrl"
    value="https://docs.google.com/spreadsheets/d/1medCkd2y-LcaVvDQZ9tgv2KxZt0hxqT4gC-7xUPHb18/edit?usp=sharing"
  />

  <label>Analysis Prompt</label>
  <textarea id="prompt">
You are an HR Analytics expert.

Analyze the employee dataset and provide:
1. Workforce summary
2. Attrition insights
3. Department-wise trends
4. Diversity analysis
5. Performance insights
6. Compensation analysis
7. Key risks
8. Actionable recommendations
9. Executive summary

Use tables and bullet points wherever useful.
  </textarea>

  <button onclick="analyzeSheet()">Analyze HR Data</button>

  <div id="loading" class="loading"></div>

  <div id="output" class="output">
    Results will appear here...
  </div>

</div>

<script>

function extractSheetId(url) {
  const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
  return match ? match[1] : null;
}

async function fetchSheetCSV(sheetId) {

  const csvUrl =
    `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

  const response = await fetch(csvUrl);

  if (!response.ok) {
    throw new Error("Unable to fetch Google Sheet.");
  }

  return await response.text();
}

async function analyzeSheet() {

  const apiKey = document.getElementById("apiKey").value.trim();
  const sheetUrl = document.getElementById("sheetUrl").value.trim();
  const prompt = document.getElementById("prompt").value.trim();

  const output = document.getElementById("output");
  const loading = document.getElementById("loading");

  output.innerHTML = "";
  loading.innerHTML = "Loading and analyzing data...";

  try {

    const sheetId = extractSheetId(sheetUrl);

    if (!sheetId) {
      throw new Error("Invalid Google Sheet URL.");
    }

    const csvData = await fetchSheetCSV(sheetId);

    const finalPrompt = `
You are a senior HR Analytics consultant.

Below is employee data from a Google Sheet in CSV format.

DATA:
${csvData}

USER REQUEST:
${prompt}

Please provide a detailed HR analytics report.
`;

    const response = await fetch(
      "https://api.openai.com/v1/chat/completions",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: "gpt-4.1-mini",
          messages: [
            {
              role: "system",
              content:
                "You are an expert HR Analytics consultant specializing in workforce analytics, attrition, performance, diversity, and organizational insights."
            },
            {
              role: "user",
              content: finalPrompt
            }
          ],
          temperature: 0.3
        })
      }
    );

    const result = await response.json();

    loading.innerHTML = "";

    if (result.error) {
      output.innerHTML =
        "API Error: " + result.error.message;
      return;
    }

    output.innerHTML =
      result.choices[0].message.content;

  } catch (error) {

    loading.innerHTML = "";

    output.innerHTML =
      "Error: " + error.message;
  }
}

</script>

</body>
</html>
