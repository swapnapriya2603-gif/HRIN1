<body>

<div class="container">

  <h1>HR Analytics AI Assistant</h1>

  <label>Groq API Key</label>
  <input type="password" id="groqKey" placeholder="Enter Groq API Key" />

  <label>Google Sheet URL</label>
  <input type="text" id="sheetUrl"
         placeholder="Paste Google Sheet URL" />

  <label>HR Analytics Prompt</label>
  <textarea id="prompt">
Analyze employee attrition trends, department performance, hiring patterns, diversity metrics, and actionable HR recommendations.
  </textarea>

  <button onclick="analyzeData()">Analyze HR Data</button>

  <div id="output"></div>

</div>

<script>

function extractSheetId(url) {
  const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
  return match ? match[1] : null;
}

function convertToCSVUrl(sheetUrl) {
  const sheetId = extractSheetId(sheetUrl);

  if (!sheetId) {
    throw new Error("Invalid Google Sheet URL");
  }

  return `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;
}

function csvToJson(csv) {
  const lines = csv.split("\n").filter(x => x.trim() !== "");

  const headers = lines[0]
    .split(",")
    .map(h => h.replace(/"/g, "").trim());

  const data = [];

  for (let i = 1; i < lines.length; i++) {
    const row = lines[i]
      .split(",")
      .map(v => v.replace(/"/g, "").trim());

    let obj = {};

    headers.forEach((header, index) => {
      obj[header] = row[index];
    });

    data.push(obj);
  }

  return data;
}

async function analyzeData() {

  const output = document.getElementById("output");

  try {

    output.innerHTML =
      '<div class="loading">Fetching Google Sheet data...</div>';

    const groqKey =
      document.getElementById("groqKey").value.trim();

    const sheetUrl =
      document.getElementById("sheetUrl").value.trim();

    const userPrompt =
      document.getElementById("prompt").value.trim();

    if (!groqKey || !sheetUrl || !userPrompt) {
      alert("Please fill all fields.");
      return;
    }

    const csvUrl = convertToCSVUrl(sheetUrl);

    const csvResponse = await fetch(csvUrl);

    if (!csvResponse.ok) {
      throw new Error("Unable to fetch Google Sheet.");
    }

    const csvText = await csvResponse.text();

    const jsonData = csvToJson(csvText);

    output.innerHTML =
      '<div class="loading">Analyzing HR data with Groq...</div>';

    const payload = {
      model: "llama-3.3-70b-versatile",
      messages: [
        {
          role: "system",
          content:
            "You are an expert HR Analytics consultant. Provide deep workforce insights, trends, KPIs, attrition analysis, hiring analytics, diversity analysis, employee engagement insights, and actionable recommendations."
        },
        {
          role: "user",
          content:
            `
            HR Dataset:
            ${JSON.stringify(jsonData).slice(0, 120000)}

            User Request:
            ${userPrompt}
            `
        }
      ],
      temperature: 0.3
    };

    const groqResponse = await fetch(
      "https://api.groq.com/openai/v1/chat/completions",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${groqKey}`
        },
        body: JSON.stringify(payload)
      }
    );

    const result = await groqResponse.json();

    console.log(result);

    const analysis =
      result?.choices?.[0]?.message?.content ||
      "No response received.";

    output.innerText = analysis;

  } catch (error) {

    console.error(error);

    output.innerHTML =
      `<span style="color:red;">Error: ${error.message}</span>`;
  }
}

</script>

</body>
</html>
